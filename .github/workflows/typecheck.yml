name: Type check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    if: |
      !startsWith(github.event.head_commit.message, 'ci:') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Scan for known bad patterns
        run: |
          echo "Scanning for next-auth v4 patterns and wrong schema names..."
          ERRORS=0

          if grep -rn "getServerSession" src/ 2>/dev/null; then
            echo "❌ Found getServerSession (next-auth v4 — use authentikAuth() instead)"
            ERRORS=$((ERRORS+1))
          fi

          if grep -rn "nextAuthConfig" src/ 2>/dev/null; then
            echo "❌ Found nextAuthConfig import (does not exist — use authentikAuth directly)"
            ERRORS=$((ERRORS+1))
          fi

          if grep -rn "organizationMemberTable" src/ 2>/dev/null; then
            echo "❌ Found organizationMemberTable (wrong name — use organizationMemberSchema)"
            ERRORS=$((ERRORS+1))
          fi

          if grep -rn "\.organizationId" src/ 2>/dev/null | grep -v "//"; then
            echo "❌ Found .organizationId column reference (schema uses .orgId)"
            ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "See agent_sync/CODEBASE_REFERENCE.md for correct patterns."
            exit 1
          fi

          echo "✅ No known bad patterns found."
