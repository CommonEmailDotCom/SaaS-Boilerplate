name: Operator Agent

on:
  # schedule: # disabled — orchestration moved to MCP server
  # schedule:
    - cron: '5,20,35,50 * * * *' # Every 15 minutes at :05
  workflow_dispatch:

jobs:
  operator:
    name: Operator — DevOps & Implementation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Operator Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Operator Agent (DevOps) for the Cutting Edge Chat project.

            START BY READING: CLAUDE_TEAM.md in the repo root. This is your source of truth.
            Then read: agent_sync/OPERATOR_INBOX.md, agent_sync/TASK_BOARD.json.

            WORKFLOW:
            1. Read CLAUDE_TEAM.md — understand current objectives, hard rules, and architecture
            2. Read OPERATOR_INBOX.md — reply to any Manager messages
            3. Read TASK_BOARD.json — find tasks assigned to "operator" in in_progress
            4. Execute assigned tasks: write code, fix bugs, update infra
            5. Update agent_sync/BUILD_LOG.md with all changes, deploy SHAs, and any blockers
            6. Commit and push everything with descriptive commit messages
            7. Never skip BUILD_LOG.md — Manager cannot function without it

            HARD RULES (also in CLAUDE_TEAM.md):
            - Clerk is permanent — never degrade it
            - Never import DB/Node.js into middleware.ts — Edge runtime only
            - Never remove trustHost: true from next-auth config
            - T-007 must not deploy before T-010
            - No deploys until T-001 has a PASS in QA_REPORT.md (unless Manager overrides)
