name: Smoke test

on:
  workflow_run:
    workflows: ["Set commit SHA for build"]
    types: [completed]
    branches: [main]

jobs:
  smoke-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get deployed SHA
        id: sha
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Waiting for SHA: ${SHORT_SHA}"

      - name: Wait for deployment
        id: deploy_wait
        continue-on-error: true
        run: |
          SHORT_SHA="${{ steps.sha.outputs.sha }}"
          MAX_ATTEMPTS=15
          ATTEMPT=0
          START_TIME=$(date +%s)

          echo "Polling https://cuttingedgechat.com/api/version for SHA ${SHORT_SHA}..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            LIVE_SHA=$(curl -sf https://cuttingedgechat.com/api/version | jq -r '.sha' 2>/dev/null || echo "")

            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: live=${LIVE_SHA} expected=${SHORT_SHA}"

            if [ "$LIVE_SHA" = "$SHORT_SHA" ]; then
              END_TIME=$(date +%s)
              ELAPSED=$(( END_TIME - START_TIME ))
              echo "deploy_time=${ELAPSED}" >> $GITHUB_OUTPUT
              echo "timed_out=false" >> $GITHUB_OUTPUT
              echo "Deployment confirmed live in ${ELAPSED}s!"
              exit 0
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              sleep 60
            fi
          done

          echo "deploy_time=0" >> $GITHUB_OUTPUT
          echo "timed_out=true" >> $GITHUB_OUTPUT
          echo "Deployment did not go live within 15 minutes"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        id: playwright
        if: steps.deploy_wait.outputs.timed_out != 'true'
        run: npx playwright test 2>&1 | tee /tmp/playwright-output.txt; echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Set timed-out playwright output
        if: steps.deploy_wait.outputs.timed_out == 'true'
        run: |
          echo "Deployment timed out — smoke tests not run." > /tmp/playwright-output.txt
          echo "exit_code=1" >> $GITHUB_OUTPUT
        id: playwright_timeout

      - name: Resolve exit code
        id: result
        if: always()
        run: |
          if [ "${{ steps.deploy_wait.outputs.timed_out }}" = "true" ]; then
            echo "exit_code=1" >> $GITHUB_OUTPUT
          else
            echo "exit_code=${{ steps.playwright.outputs.exit_code }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate job summary
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="https://github.com/CommonEmailDotCom/SaaS-Boilerplate/actions/runs/${{ github.run_id }}"
          DEPLOY_TIME="${{ steps.deploy_wait.outputs.deploy_time }}"
          EXIT_CODE="${{ steps.result.outputs.exit_code }}"
          node scripts/smoke-summary.js \
            "${{ steps.sha.outputs.sha }}" \
            "${DEPLOY_TIME:-0}" \
            "${EXIT_CODE:-1}" \
            "/tmp/playwright-output.txt" \
            "$RUN_URL"
          mv smoke-status.json /tmp/smoke-status.json

      - name: Commit smoke-status.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- .
          git pull --rebase origin main
          cp /tmp/smoke-status.json smoke-status.json
          git add smoke-status.json
          git diff --staged --quiet || git commit -m "ci: update smoke-status.json [skip ci]"
          git push

      - name: Upload smoke summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-summary
          path: /tmp/smoke-summary.md
          retention-days: 30

      - name: Set commit status
        if: always()
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          EXIT_CODE="${{ steps.result.outputs.exit_code }}"

          if [ "$EXIT_CODE" = "0" ]; then
            STATE="success"
            DESCRIPTION="Smoke test passed"
          elif [ "${{ steps.deploy_wait.outputs.timed_out }}" = "true" ]; then
            STATE="failure"
            DESCRIPTION="Smoke test failed — deployment timed out"
          else
            STATE="failure"
            DESCRIPTION="Smoke test failed"
          fi

          curl -s -X POST \
            "https://api.github.com/repos/CommonEmailDotCom/SaaS-Boilerplate/statuses/${SHA}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"${STATE}\",\"description\":\"${DESCRIPTION}\",\"context\":\"smoke-test\"}"

      - name: Fail if tests failed
        if: steps.result.outputs.exit_code != '0'
        run: exit 1

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-report/
          retention-days: 7
