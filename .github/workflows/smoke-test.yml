name: Smoke Test — Cutting Edge Chat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Smoke test — check app is up
        id: smoke
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://cuttingedgechat.com/api/version || echo "000")
          echo "status_code=$STATUS_CODE" >> $GITHUB_OUTPUT
          if [ "$STATUS_CODE" = "200" ]; then
            echo "result=passing" >> $GITHUB_OUTPUT
            echo "✅ Smoke test PASSING — /api/version returned 200"
          else
            echo "result=failing" >> $GITHUB_OUTPUT
            echo "❌ Smoke test FAILING — /api/version returned $STATUS_CODE"
          fi

      - name: Check deployment health
        id: health
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://cuttingedgechat.com/ || echo "000")
          echo "health_code=$HEALTH" >> $GITHUB_OUTPUT
          echo "Root / returned: $HEALTH"

      - name: Write smoke-status.json to MCP server
        # Always write — even on failure — so badge never goes stale
        if: always()
        env:
          MCP_DEPLOY_SECRET: ${{ secrets.MCP_DEPLOY_SECRET }}
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          RESULT="${{ steps.smoke.outputs.result }}"
          STATUS_CODE="${{ steps.smoke.outputs.status_code }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Default to failing if result is empty (step errored)
          if [ -z "$RESULT" ]; then
            RESULT="failing"
          fi

          JSON_PAYLOAD=$(cat <<EOF
          {
            "sha": "${SHA}",
            "status": "${RESULT}",
            "result": "${RESULT}",
            "outcome": "${RESULT}",
            "http_status": "${STATUS_CODE}",
            "timestamp": "${TIMESTAMP}",
            "run_id": "${{ github.run_id }}"
          }
          EOF
          )

          echo "Writing smoke-status.json: $JSON_PAYLOAD"

          curl -s -X POST https://mcp.joefuentes.me/update-smoke-status \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${MCP_DEPLOY_SECRET}" \
            -d "$JSON_PAYLOAD" \
            --max-time 15 || echo "Warning: Failed to write smoke-status.json to MCP server — badge may be stale"

      - name: Fail job if smoke test failed
        if: steps.smoke.outputs.result == 'failing'
        run: |
          echo "❌ Smoke test FAILED — see logs above"
          exit 1
