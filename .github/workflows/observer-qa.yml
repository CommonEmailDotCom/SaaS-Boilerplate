name: Observer QA — T-001 Auth Matrix

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Playwright test filter (leave blank for all T-001 tests)'
        required: false
        default: ''
  push:
    branches:
      - main

jobs:
  t001-auth-matrix:
    name: T-001 Auth Matrix (A–E)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TEST_BASE_URL: ${{ secrets.TEST_BASE_URL || 'https://cuttingedgechat.com' }}
      GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
      GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
      ADMIN_API_SECRET: ${{ secrets.ADMIN_API_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + system deps
        run: npx playwright install chromium --with-deps

      - name: Verify secrets are present
        run: |
          if [ -z "$GOOGLE_TEST_EMAIL" ]; then
            echo "❌ GOOGLE_TEST_EMAIL secret is not set. Owner must add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "$GOOGLE_TEST_PASSWORD" ]; then
            echo "❌ GOOGLE_TEST_PASSWORD secret is not set. Owner must add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "$ADMIN_API_SECRET" ]; then
            echo "❌ ADMIN_API_SECRET secret is not set. Owner must add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          echo "✅ All required secrets present."

      - name: Run T-001 Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test e2e/t001-auth.spec.ts --grep "${{ github.event.inputs.test_filter }}" --reporter=list
          else
            npx playwright test e2e/t001-auth.spec.ts --reporter=list
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
