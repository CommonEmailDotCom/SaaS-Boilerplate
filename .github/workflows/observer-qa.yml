name: Observer QA — T-001 Auth Matrix

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Playwright test filter (leave blank for all)'
        required: false
        default: ''

jobs:
  t001-auth-matrix:
    name: T-001 Auth Matrix (A–E)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      QA_GMAIL_EMAIL: ${{ secrets.QA_GMAIL_EMAIL }}
      QA_GMAIL_PASSWORD: ${{ secrets.QA_GMAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Verify secrets
        run: |
          [ -z "$QA_GMAIL_EMAIL" ] && echo "❌ QA_GMAIL_EMAIL not set" && exit 1
          [ -z "$QA_GMAIL_PASSWORD" ] && echo "❌ QA_GMAIL_PASSWORD not set" && exit 1
          echo "✅ Secrets present"

      - name: Run T-001 tests
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test e2e/t001-auth.spec.ts --grep "${{ github.event.inputs.test_filter }}" --reporter=list
          else
            npx playwright test e2e/t001-auth.spec.ts --reporter=list
          fi

      - name: Write result to QA_REPORT.md
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/CommonEmailDotCom/SaaS-Boilerplate/actions/runs/${{ github.run_id }}"
          if [ "$STATUS" = "success" ]; then
            RESULT="🟢 T-001 PASS — DEPLOY SIGNAL"
          else
            RESULT="🔴 T-001 FAIL"
          fi
          printf "\n## %s — Run %s\n- **Time:** %s\n- **SHA:** %s\n- **Run:** %s\n- **Status:** %s\n" \
            "$RESULT" "${{ github.run_id }}" "$TIMESTAMP" "$SHA" "$RUN_URL" "$STATUS" \
            >> agent_sync/QA_REPORT.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add agent_sync/QA_REPORT.md
          git diff --staged --quiet || git commit -m "ci: T-001 ${RESULT} (${SHA})"
          git push

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
