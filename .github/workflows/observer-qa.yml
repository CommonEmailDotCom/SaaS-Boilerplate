name: Observer QA — Auth Flow

on:
  workflow_run:
    workflows: ["Set commit SHA for build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: observer-qa-main
  cancel-in-progress: true

jobs:
  auth-qa:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Create screenshots dir
        run: mkdir -p agent_sync/screenshots

      - name: Run T-001 auth flow tests
        id: qa
        env:
          QA_GMAIL_EMAIL: ${{ secrets.QA_GMAIL_EMAIL }}
          QA_GMAIL_PASSWORD: ${{ secrets.QA_GMAIL_PASSWORD }}
          QA_AUTHENTIK_EMAIL: ${{ secrets.QA_AUTHENTIK_EMAIL }}
          QA_AUTHENTIK_PASSWORD: ${{ secrets.QA_AUTHENTIK_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          npx playwright test tests/e2e/auth.spec.ts \
            --reporter=list \
            2>&1 | tee /tmp/qa-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate QA report for Observer loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/qa-report.js "${{ github.sha }}" "${{ steps.qa.outputs.exit_code }}" "/tmp/qa-output.txt"

      - name: Commit QA report + screenshots to agent_sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "observer-agent[bot]"
          git config user.email "observer-agent[bot]@users.noreply.github.com"

          # Hard reset to exact remote HEAD — clean slate, no local drift
          git fetch origin main
          git reset --hard origin/main

          # Stage only QA output — nothing else
          git add agent_sync/QA_REPORT_ACTIONS.md
          git add agent_sync/screenshots/ 2>/dev/null || true

          # Skip if nothing changed
          git diff --staged --quiet && echo "No QA output to commit" && exit 0

          git commit -m "ci: observer QA report ${{ github.sha }} [skip ci]"
          git push origin HEAD:main

      - name: Upload Playwright artifacts on failure
        if: steps.qa.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: qa-playwright-results
          path: |
            playwright-report/
            agent_sync/screenshots/
          retention-days: 7

      - name: Fail job if tests failed
        if: steps.qa.outputs.exit_code != '0'
        run: exit 1
