name: Set commit SHA for build

on:
  push:
    branches: [main]

jobs:
  set-version:
    if: |
      !startsWith(github.event.head_commit.message, 'ci:') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package-lock.json if package.json changed
        run: |
          if git diff HEAD~1 --name-only 2>/dev/null | grep -q "^package\.json$"; then
            echo "package.json changed — regenerating package-lock.json"
            npm install --package-lock-only
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git diff --staged --quiet || git commit -m "ci: update package-lock.json for new dependencies"
            git push
          else
            echo "package.json unchanged — skipping lock file update"
          fi

      - name: Write SHA to .env.production and push (with retry)
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            git fetch origin main
            git reset --hard origin/main
            grep -v "NEXT_PUBLIC_COMMIT_SHA" .env.production 2>/dev/null > .env.production.tmp || true
            echo "NEXT_PUBLIC_COMMIT_SHA=${SHORT_SHA}" >> .env.production.tmp
            mv .env.production.tmp .env.production
            git add .env.production
            if git diff --staged --quiet; then
              echo "SHA already written — nothing to commit"
              exit 0
            fi
            git commit -m "ci: ${SHORT_SHA} ${COMMIT_MSG}"
            if git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push rejected, retrying in 5s..."
            git reset --soft HEAD~1
            sleep 5
          done
          echo "All push attempts failed"
          exit 1

      - name: Trigger Coolify deployment
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://mcp.joefuentes.me/trigger-deploy?uuid=tuk1rcjj16vlk33jrbx3c9d3" \
            -H "Authorization: Bearer ${{ secrets.MCP_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Failed to trigger Coolify deploy, status: $HTTP_STATUS"
            exit 1
          fi
          echo "Coolify deployment triggered successfully"
