name: Set commit SHA for build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'Dockerfile'

jobs:
  set-version:
    if: |
      !startsWith(github.event.head_commit.message, 'ci:') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package-lock.json if package.json changed
        run: |
          if git diff HEAD~1 --name-only 2>/dev/null | grep -q "^package\.json$"; then
            npm install --package-lock-only
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git diff --staged --quiet || git commit -m "ci: update package-lock.json for new dependencies"
            git push
          fi

      - name: Write SHA to .env.production
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          grep -v "NEXT_PUBLIC_COMMIT_SHA" .env.production 2>/dev/null > .env.production.tmp || true
          echo "NEXT_PUBLIC_COMMIT_SHA=${SHORT_SHA}" >> .env.production.tmp
          mv .env.production.tmp .env.production

      - name: Commit and trigger deploy
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add .env.production
          git diff --staged --quiet || git commit -m "ci: ${SHORT_SHA} ${COMMIT_MSG}"
          git push

      - name: Trigger Coolify deployment
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://mcp.joefuentes.me/trigger-deploy?uuid=tuk1rcjj16vlk33jrbx3c9d3" \
            -H "Authorization: Bearer ${{ secrets.MCP_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" != "200" ]; then exit 1; fi
          echo "Coolify deployment triggered successfully"
