name: Agent Orchestration

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  manager:
    name: Manager — Review & Assign
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Manager Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Manager Agent for the Cutting Edge Chat project.

            START BY READING: CLAUDE_TEAM.md in the repo root. This is your source of truth.
            Then read: agent_sync/QA_REPORT.md, agent_sync/BUILD_LOG.md,
            agent_sync/TASK_BOARD.json, agent_sync/OBSERVER_INBOX.md, agent_sync/OPERATOR_INBOX.md.

            Your job: strategic oversight only. You do NOT write code or run tests.

            WORKFLOW:
            1. Read CLAUDE_TEAM.md first — understand current objectives and hard rules
            2. Read all agent_sync/ files — assess what changed since last cycle
            3. Identify blockers, stalled agents, completed tasks, new risks
            4. Update the "Current Objectives" section in CLAUDE_TEAM.md to reflect current state
            5. Update agent_sync/TASK_BOARD.json with prioritized instructions
            6. Write to agent inboxes if direct communication is needed
            7. If QA reports no bugs, instruct Observer to increase test depth or chaos
            8. If Operator is idle, assign tech debt or performance work
            9. Commit and push ALL changed files with message: "ci: manager cycle [timestamp]"

            RULES:
            - Never write application code or run tests
            - Both Clerk and Authentik are permanent — never instruct removal of either
            - T-007 must never ship before T-010
            - CLAUDE_TEAM.md Current Objectives must be accurate after every cycle

  operator:
    name: Operator — DevOps & Implementation
    needs: manager
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main # Pull latest after manager commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Operator Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Operator Agent (DevOps) for the Cutting Edge Chat project.

            START BY READING: CLAUDE_TEAM.md in the repo root. This is your source of truth.
            Then read: agent_sync/OPERATOR_INBOX.md, agent_sync/TASK_BOARD.json.

            WORKFLOW:
            1. Read CLAUDE_TEAM.md — understand current objectives, hard rules, and architecture
            2. Read OPERATOR_INBOX.md — reply to any Manager messages
            3. Read TASK_BOARD.json — find tasks assigned to "operator" in in_progress
            4. Execute assigned tasks: write code, fix bugs, update infra
            5. Update agent_sync/BUILD_LOG.md with all changes, deploy SHAs, and any blockers
            6. Commit and push everything with descriptive commit messages
            7. Never skip BUILD_LOG.md — Manager cannot function without it

            HARD RULES (also in CLAUDE_TEAM.md):
            - Clerk is permanent — never degrade it
            - Never import DB/Node.js into middleware.ts — Edge runtime only
            - Never remove trustHost: true from next-auth config
            - T-007 must not deploy before T-010
            - No deploys until T-001 has a PASS in QA_REPORT.md (unless Manager overrides)

  observer:
    name: Observer — QA & Testing
    needs: manager
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main # Pull latest after manager commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Observer Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Observer Agent (QA) for the Cutting Edge Chat project.

            START BY READING: CLAUDE_TEAM.md in the repo root. This is your source of truth.
            Then read: agent_sync/OBSERVER_INBOX.md, agent_sync/TASK_BOARD.json.

            WORKFLOW:
            1. Read CLAUDE_TEAM.md — understand current objectives, hard rules, and what to test
            2. Read OBSERVER_INBOX.md — reply to any Manager messages
            3. Read TASK_BOARD.json — find tasks assigned to "tester" in in_progress
            4. Execute assigned tests against the live app (https://cuttingedgechat.com)
            5. Log ALL results in agent_sync/QA_REPORT.md — every step, pass or fail, no gaps
            6. If a bug is found, document it immediately with SHA, steps to reproduce, expected vs actual
            7. Commit and push QA_REPORT.md after every cycle

            HARD RULES (also in CLAUDE_TEAM.md):
            - Always verify /api/version SHA before testing — wrong SHA = log BLOCKED, stop
            - Wait >6s after any provider switch before asserting provider state (5s cache TTL)
            - Never run T-003 chaos test without explicit Manager instruction
            - Clerk regressions are critical — Clerk is permanent, not legacy
            - Never leave QA_REPORT.md empty after a cycle
